<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="700" viewBox="0 0 1280 700">
      <defs>
        <linearGradient id="schemaBg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f6fbff"/>
          <stop offset="100%" stop-color="#e8f3ea"/>
        </linearGradient>
        <style>
          .title { font: 700 42px 'Segoe UI', 'PingFang SC', sans-serif; fill: #102943; }
          .subtitle { font: 400 18px 'Segoe UI', 'PingFang SC', sans-serif; fill: #4c607b; }
          .group { font: 700 26px 'Segoe UI', 'PingFang SC', sans-serif; fill: #12365e; }
          .token { font: 500 18px 'Segoe UI', 'PingFang SC', sans-serif; fill: #48627e; }
        </style>
      </defs>
      <rect width="100%" height="100%" rx="36" fill="url(#schemaBg)"/>
      <text x="56" y="62" class="title">Structured Field Coverage</text>
      <text x="56" y="94" class="subtitle">Core variable groups extracted from the source workbooks</text>
      
            <g transform="translate(56, 124)">
              <rect width="268" height="460" rx="28" fill="rgba(255,255,255,0.92)" stroke="rgba(13, 46, 82, 0.12)"/>
              <text x="28" y="54" class="group">Demographics</text>
              <text x="28" y="108" class="token">Medical Record No.</text><text x="28" y="156" class="token">Pathology No.</text><text x="28" y="204" class="token">Sex</text><text x="28" y="252" class="token">Age</text><text x="28" y="300" class="token">Height</text><text x="28" y="348" class="token">Weight</text>
            </g>
            
            <g transform="translate(356, 124)">
              <rect width="268" height="460" rx="28" fill="rgba(255,255,255,0.92)" stroke="rgba(13, 46, 82, 0.12)"/>
              <text x="28" y="54" class="group">History &amp; Comorbidity</text>
              <text x="28" y="108" class="token">Smoking</text><text x="28" y="156" class="token">Alcohol Use</text><text x="28" y="204" class="token">Diabetes</text><text x="28" y="252" class="token">Hypertension</text><text x="28" y="300" class="token">Obstruction</text><text x="28" y="348" class="token">Perforation</text>
            </g>
            
            <g transform="translate(656, 124)">
              <rect width="268" height="460" rx="28" fill="rgba(255,255,255,0.92)" stroke="rgba(13, 46, 82, 0.12)"/>
              <text x="28" y="54" class="group">Tumor Features</text>
              <text x="28" y="108" class="token">Pre-op CEA</text><text x="28" y="156" class="token">Pre-op CA19-9</text><text x="28" y="204" class="token">T</text><text x="28" y="252" class="token">N</text><text x="28" y="300" class="token">M</text><text x="28" y="348" class="token">Stage</text>
            </g>
            
            <g transform="translate(956, 124)">
              <rect width="268" height="460" rx="28" fill="rgba(255,255,255,0.92)" stroke="rgba(13, 46, 82, 0.12)"/>
              <text x="28" y="54" class="group">Follow-up Endpoints</text>
              <text x="28" y="108" class="token">Surgery Date</text><text x="28" y="156" class="token">Latest Follow-up</text><text x="28" y="204" class="token">Vital Status</text><text x="28" y="252" class="token">OS</text><text x="28" y="300" class="token">OS.time</text>
