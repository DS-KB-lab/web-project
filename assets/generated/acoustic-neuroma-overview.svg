<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="770" viewBox="0 0 1280 770">
      <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#eef6ff"/>
          <stop offset="48%" stop-color="#d9f3ee"/>
          <stop offset="100%" stop-color="#f8fbff"/>
        </linearGradient>
        <linearGradient id="barGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#0f5ea8"/>
          <stop offset="100%" stop-color="#23a2b6"/>
        </linearGradient>
        <style>
          .title { font: 700 44px 'Segoe UI', 'PingFang SC', sans-serif; fill: #112240; }
