          .label { font: 600 18px 'Segoe UI', 'PingFang SC', sans-serif; fill: #56708f; }
          .value { font: 700 34px 'Segoe UI', 'PingFang SC', sans-serif; fill: #123254; }
          .note { font: 400 14px 'Segoe UI', 'PingFang SC', sans-serif; fill: #60758f; }
          .group-title { font: 700 22px 'Segoe UI', 'PingFang SC', sans-serif; fill: #17395c; }
          .axis { font: 500 15px 'Segoe UI', 'PingFang SC', sans-serif; fill: #506680; }
          .axis-value { font-weight: 700; fill: #153a60; }
          .axis-count { text-anchor: end; }
        </style>
      </defs>
      <rect width="100%" height="100%" rx="36" fill="url(#bgGradient)"/>
      <circle cx="1160" cy="96" r="96" fill="rgba(15, 94, 168, 0.08)"/>
