<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="440" viewBox="0 0 1040 440">
      <defs>
        <linearGradient id="mriBg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#081f3f"/>
          <stop offset="100%" stop-color="#134b73"/>
        </linearGradient>
        <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6dd5ed"/>
          <stop offset="100%" stop-color="#8ef7c5"/>
        </linearGradient>
        <style>
          .title { font: 700 36px 'Segoe UI', 'PingFang SC', sans-serif; fill: #f6fbff; }
          .subtitle { font: 400 17px 'Segoe UI', 'PingFang SC', sans-serif; fill: rgba(246, 251, 255, 0.72); }
          .stage { font: 700 23px 'Segoe UI', 'PingFang SC', sans-serif; fill: #0d2740; }
          .meta { font: 500 14px 'Segoe UI', 'PingFang SC', sans-serif; fill: #355c77; }
        </style>
      </defs>
      <rect width="100%" height="100%" rx="36" fill="url(#mriBg)"/>
      <text x="56" y="60" class="title">MRI Multi-field-strength Roadmap</text>
      <text x="56" y="90" class="subtitle">Roadmap for cross-field-strength MRI collection and collaboration</text>
      <line x1="112" y1="242" x2="930" y2="242" stroke="url(#beam)" stroke-width="14" stroke-linecap="round"/>
      <g transform="translate(118, 166)">
        <circle cx="0" cy="76" r="28" fill="#f1f7ff"/>
        <rect x="-38" y="-2" width="154" height="72" rx="22" fill="#f1f7ff"/>
        <text x="-12" y="28" class="stage">0.05T</text>
        <text x="-12" y="51" class="meta">Ultra-low-field starting point</text>
      </g>
      <g transform="translate(378, 132)">
        <circle cx="0" cy="110" r="30" fill="#dff9ee"/>
        <rect x="-48" y="6" width="220" height="94" rx="26" fill="#dff9ee"/>
        <text x="-18" y="40" class="stage">3T</text>
        <text x="-18" y="64" class="meta">53 matched cases available</text>
        <text x="-18" y="86" class="meta">Scaling toward 100 cases</text>
      </g>
      <g transform="translate(668, 164)">
        <circle cx="0" cy="78" r="28" fill="#f1f7ff"/>
        <rect x="-50" y="-4" width="190" height="74" rx="22" fill="#f1f7ff"/>
        <text x="-18" y="28" class="stage">5T</text>
        <text x="-18" y="51" class="meta">Planned high-field extension</text>
      </g>
      <g transform="translate(914, 106)">
        <circle cx="0" cy="136" r="28" fill="#dff9ee"/>
        <rect x="-52" y="22" width="194" height="74" rx="22" fill="#dff9ee"/>
        <text x="-20" y="54" class="stage">7T</text>
        <text x="-20" y="77" class="meta">Supports ultra-high-field research</text>
      </g>
    </svg>